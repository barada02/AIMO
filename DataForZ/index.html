<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADK Agent Test UI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 40px auto; background-color: #f4f4f9; color: #333; }
        h2 { text-align: center; color: #444; }
        #chat-box { background: white; border: 1px solid #ddd; border-radius: 8px; height: 400px; padding: 15px; overflow-y: auto; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .msg { margin-bottom: 15px; line-height: 1.4; }
        .user-msg { text-align: right; color: #0056b3; }
        .agent-msg { text-align: left; color: #28a745; background-color: #eef9f0; padding: 10px; border-radius: 5px; }
        .agent-name { font-weight: bold; font-size: 0.8em; color: #555; margin-bottom: 3px; }
        .input-group { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { padding: 10px 20px; border: none; background-color: #007bff; color: white; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h2>Agent API Tester</h2>
    <div id="chat-box">
        <div class="msg" style="color: #888; text-align: center; font-style: italic;">Chat session started. Say hello to your agent!</div>
    </div>
    
    <div class="input-group">
        <input type="text" id="userInput" placeholder="Ask your ADK agent..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('userInput');

        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Show User Message
            chatBox.innerHTML += `<div class="msg user-msg"><b>You:</b> ${text}</div>`;
            userInput.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // 2. Add Loading Indicator
            const loadingId = 'loading-' + Date.now();
            chatBox.innerHTML += `<div id="${loadingId}" class="msg agent-msg" style="color: gray;"><i>Agent is thinking...</i></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // 3. Ping the FastAPI Endpoint
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, session_id: "test-session" })
                });

                const data = await response.json();
                
                // 4. Remove Loading Indicator and Show Response
                document.getElementById(loadingId).remove();
                
                if (data.reply) {
                    chatBox.innerHTML += `<div class="msg agent-msg"><div class="agent-name">${data.agent_name}</div>${data.reply}</div>`;
                } else {
                    chatBox.innerHTML += `<div class="msg agent-msg" style="color: red;">Error processing reply.</div>`;
                }

            } catch (err) {
                document.getElementById(loadingId).remove();
                chatBox.innerHTML += `<div class="msg agent-msg" style="color: red;">Connection Failed: ${err.message}. Is FastAPI running?</div>`;
            }
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
