<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataForZ Operator</title>
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>
    <div id="app">
        
        <!-- Left Pane: Navigation & Task Selection -->
        <div class="pane" id="left-pane">
            <div class="pane-header">Dashboard</div>
            <div class="nav-section">
                <h3 class="nav-title">Active Mode</h3>
                
                <button class="mode-btn active" id="btn-distill" onclick="selectMode('distill')">
                    Knowledge Distillation
                    <span class="desc">Agent synthesizes raw text into CoT JSON</span>
                </button>
                
                <button class="mode-btn" id="btn-sft" onclick="selectMode('sft')">
                    Supervised Fine-Tuning
                    <span class="desc">You provide problem & solution => AI builds data</span>
                </button>
            </div>
        </div>

        <!-- Middle Pane: The Data Editor -->
        <div class="pane" id="middle-pane">
            <div class="pane-header">
                <span id="editor-title">Document Content (JSON)</span>
                <span style="font-size: 0.7rem; color: #4ade80;">● Auto-sync Active</span>
            </div>
            <textarea id="json-editor" placeholder="{\n  // The agent's generated JSON will perfectly render here...\n  // You can manually edit this safely before committing.\n}"></textarea>
            <div class="editor-toolbar">
                <button class="btn-primary" onclick="commitToDatabase()">Push to Database 🚀</button>
            </div>
        </div>

        <!-- Right Pane: The AI Chat / Context Loop -->
        <div class="pane" id="right-pane">
            <div class="pane-header">Agent Co-Pilot</div>
            
            <div id="chat-history">
                <div class="chat-bubble bubble-ai">
                    System loaded. Currently operating in <b>Knowledge Distillation</b> mode. What raw text should we process?
                </div>
            </div>

            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <input type="text" id="chat-input" placeholder="Instruct the agent..." onkeypress="handleEnter(event)">
                    <button onclick="sendChatMessage()">Send</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        let currentMode = "distill";

        // Mode Selector Logic
        function selectMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
            
            const chatHistory = document.getElementById('chat-history');
            const modeName = mode === 'distill' ? "Knowledge Distillation" : "SFT (Supervised Fine-Tuning)";
            
            // Add system notification to chat
            const sysMsg = document.createElement('div');
            sysMsg.className = 'chat-bubble bubble-ai';
            sysMsg.innerHTML = `<span style="color:#ec4899;">[System]</span> Switched to <b>${modeName}</b> mode.`;
            chatHistory.appendChild(sysMsg);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendChatMessage();
        }

        async function sendChatMessage() {
            const inputEl = document.getElementById('chat-input');
            const chatHistory = document.getElementById('chat-history');
            const editor = document.getElementById('json-editor');
            const documentContext = editor.value; // Grabbing whatever is in the middle pane
            
            const text = inputEl.value.trim();
            if(!text) return;

            // Render User Message
            const userMsg = document.createElement('div');
            userMsg.className = 'chat-bubble bubble-user';
            userMsg.textContent = text;
            chatHistory.appendChild(userMsg);
            
            inputEl.value = '';
            chatHistory.scrollTop = chatHistory.scrollHeight;

            // Render loading State
            const loadingId = 'loading-' + Date.now();
            const loadingMsg = document.createElement('div');
            loadingMsg.id = loadingId;
            loadingMsg.className = 'chat-bubble bubble-ai';
            loadingMsg.innerHTML = '<i>Processing request...</i>';
            chatHistory.appendChild(loadingMsg);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            try {
                // Here we will eventually send BOTH the active Mode, the message, and the existing JSON document
                // so the backend can inject it into the System Prompt. 
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: `[MODE=${currentMode}] ${text}`, // Temporary mock data structure
                        session_id: "test-session" 
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                const aiMsg = document.createElement('div');
                aiMsg.className = 'chat-bubble bubble-ai';
                
                // For Phase 1, we just dump the response in the chat. 
                // Later, if it detects JSON, we'll route it to the Editor instead.
                aiMsg.textContent = data.reply;
                chatHistory.appendChild(aiMsg);

            } catch(e) {
                document.getElementById(loadingId).remove();
                const errMsg = document.createElement('div');
                errMsg.className = 'chat-bubble bubble-ai';
                errMsg.style.color = '#f87171';
                errMsg.textContent = "Error: " + e.message;
                chatHistory.appendChild(errMsg);
            }

            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function commitToDatabase() {
            alert("Database connection phase is next! The JSON in the middle pane will be POSTed securely.");
        }
    </script>
</body>
</html>
